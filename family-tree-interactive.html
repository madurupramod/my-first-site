<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree – Living Characters</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0d1b2a;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
  width:100vw;height:100vh;
}
#stage{position:fixed;inset:0;overflow:hidden;}
#sky{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#0a1520 0%,#152a45 55%,#1e4060 100%);
}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate;}
@keyframes twinkle{from{opacity:.15}to{opacity:.85}}
#ground{
  position:absolute;bottom:0;left:0;right:0;height:100px;
  background:linear-gradient(0deg,#122012 0%,#254525 55%,#336633 100%);
  border-top:2px solid #4a8a4a;z-index:3;
}
.tuft{
  position:absolute;bottom:98px;width:10px;height:10px;
  background:#3a7a3a;clip-path:polygon(50% 0%,100% 100%,0% 100%);opacity:.6;
}
#treeCanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:4;}

/* ── WALK-IN CHARACTERS ── */
.character{
  position:absolute;z-index:20;
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;bottom:68px;
}
.char-svg{width:36px;height:56px;}
.speech-bubble{
  position:absolute;bottom:62px;
  background:rgba(255,255,255,.96);color:#1a1a2e;
  font-size:10px;font-weight:700;border-radius:10px;padding:4px 8px;
  white-space:nowrap;opacity:0;pointer-events:none;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  transform:translateX(-50%);left:50%;transition:opacity .4s;z-index:30;
}
.speech-bubble::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);border:5px solid transparent;
  border-top-color:rgba(255,255,255,.96);
}

/* ── NODE BOXES ── */
.tree-node{
  position:absolute;z-index:10;opacity:0;
  transform:translateX(-50%);
  cursor:pointer;
  transition:opacity .3s;
}
.tree-node.visible{pointer-events:auto;}
.node-box{
  display:flex;align-items:center;gap:4px;
  background:rgba(12,25,45,.92);
  border:1.5px solid rgba(90,170,255,.5);
  border-radius:6px;padding:3px 8px 3px 5px;
  white-space:nowrap;box-shadow:0 1px 8px rgba(0,0,0,.5);
  transition:border-color .2s, box-shadow .2s, transform .15s;
}
.node-box.f{border-color:rgba(255,140,190,.55);background:rgba(35,12,30,.92);}
.tree-node:hover .node-box{
  transform:scale(1.08);
  box-shadow:0 0 14px 3px rgba(120,200,255,.35);
  border-color:rgba(120,200,255,.9);
}
.tree-node:hover .node-box.f{
  box-shadow:0 0 14px 3px rgba(255,140,190,.35);
  border-color:rgba(255,170,210,.9);
}
.node-box.selected{
  border-color:#fff !important;
  box-shadow:0 0 18px 4px rgba(255,255,255,.35) !important;
}
.node-icon{flex-shrink:0;}
.node-label{font-weight:700;color:#d8eeff;white-space:nowrap;}
.node-label.fl{color:#ffd8ee;}
@keyframes glowM{0%{box-shadow:0 0 14px 4px rgba(90,170,255,.7)}100%{box-shadow:0 1px 8px rgba(0,0,0,.5)}}
@keyframes glowF{0%{box-shadow:0 0 14px 4px rgba(255,140,190,.7)}100%{box-shadow:0 1px 8px rgba(0,0,0,.5)}}
.glow-m{animation:glowM 1.4s ease-out forwards;}
.glow-f{animation:glowF 1.4s ease-out forwards;}

/* ══════════════════════════════════════════
   INTERACTIVE POPUP
══════════════════════════════════════════ */
#info-popup{
  position:fixed;
  z-index:500;
  pointer-events:none;
  opacity:0;
  transition:opacity .25s;
}
#info-popup.show{opacity:1;pointer-events:auto;}

/* The animated character in popup */
#popup-char{
  position:absolute;
  bottom:calc(100% - 4px);
  left:50%;transform:translateX(-50%);
  width:52px;height:80px;
  display:flex;align-items:flex-end;justify-content:center;
  animation:popBounce .5s cubic-bezier(.36,1.56,.64,1) forwards;
}
@keyframes popBounce{
  from{transform:translateX(-50%) scale(0) translateY(20px);}
  to{transform:translateX(-50%) scale(1) translateY(0);}
}
#popup-char svg{width:48px;height:74px;}

/* Idle sway */
@keyframes idleSway{
  0%,100%{transform:translateX(-50%) rotate(-3deg);}
  50%{transform:translateX(-50%) rotate(3deg);}
}
#popup-char.idle{animation:idleSway 1.8s ease-in-out infinite;}

/* The card */
#popup-card{
  background:rgba(8,18,35,.97);
  border:2px solid rgba(100,180,255,.6);
  border-radius:14px;
  padding:14px 18px 14px 16px;
  min-width:200px;max-width:280px;
  box-shadow:0 8px 32px rgba(0,0,0,.7), 0 0 0 1px rgba(100,180,255,.1);
  position:relative;
}
#popup-card.fc{border-color:rgba(255,140,190,.65);}

/* typing text lines */
.pop-line{
  font-size:12px;line-height:1.6;color:#c8e0ff;
  min-height:19px;
  display:flex;align-items:flex-start;gap:6px;
}
.pop-line .icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.pop-line .txt{flex:1;}
.pop-line + .pop-line{margin-top:4px;}
.pop-line .highlight{color:#7ed4ff;font-weight:700;}
.pop-line.fc-line .highlight{color:#ffadd8;}

/* typing cursor */
.cursor{
  display:inline-block;width:2px;height:12px;
  background:#7ed4ff;margin-left:1px;vertical-align:middle;
  animation:blink .6s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* close btn */
#popup-close{
  position:absolute;top:8px;right:10px;
  background:none;border:none;color:rgba(255,255,255,.4);
  font-size:16px;cursor:pointer;line-height:1;
  transition:color .2s;
}
#popup-close:hover{color:#fff;}

/* ── CONTROLS ── */
#controls{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  z-index:300;display:flex;gap:8px;
  background:rgba(0,0,0,.55);padding:8px 14px;border-radius:40px;
  border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(6px);
}
.btn{
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;
  padding:6px 16px;border:none;border-radius:20px;
  cursor:pointer;transition:all .25s;letter-spacing:.03em;
}
.bp{background:linear-gradient(135deg,#3aaa8a,#2070a0);color:#fff;}
.bp:hover{transform:scale(1.05);}
.br{background:rgba(255,255,255,.14);color:#fff;}
.br:hover{background:rgba(255,255,255,.24);}
.bs{background:rgba(255,200,70,.16);color:#ffcc50;}
.bs:hover{background:rgba(255,200,70,.3);}

#title{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  z-index:300;text-align:center;pointer-events:none;white-space:nowrap;
}
#title h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(.8rem,2vw,1.3rem);color:#ddeeff;
  text-shadow:0 0 24px rgba(80,180,255,.4);letter-spacing:.06em;
}
#title p{font-size:.65rem;color:rgba(255,255,255,.38);margin-top:2px;letter-spacing:.12em;}

#progress{
  position:fixed;top:58px;left:50%;transform:translateX(-50%);
  z-index:300;font-size:10px;color:rgba(255,255,255,.45);
  letter-spacing:.06em;white-space:nowrap;max-width:90vw;
  overflow:hidden;text-overflow:ellipsis;
}

#hint{
  position:fixed;bottom:58px;left:50%;transform:translateX(-50%);
  z-index:300;font-size:10px;color:rgba(255,255,255,.3);
  letter-spacing:.08em;opacity:0;transition:opacity .5s;
  pointer-events:none;white-space:nowrap;
}
#hint.show{opacity:1;}
</style>
</head>
<body>
<div id="stage">
  <div id="sky"></div>
  <canvas id="treeCanvas"></canvas>
  <div id="ground"></div>
</div>

<!-- Info popup -->
<div id="info-popup">
  <div id="popup-char"></div>
  <div id="popup-card">
    <button id="popup-close" onclick="closePopup()">✕</button>
    <div id="popup-lines"></div>
  </div>
</div>

<div id="title">
  <h1>✦ The Family of Kondaiya ✦</h1>
  <p>An Animated Lineage · Click any name to hear their story</p>
</div>
<div id="progress"></div>
<div id="hint">👆 Click on any name to learn about them</div>

<div id="controls">
  <button class="btn bp" onclick="startShow()">▶ Begin</button>
  <button class="btn bs" onclick="skipToEnd()">⏭ Skip</button>
  <button class="btn br" onclick="resetShow()">↺ Reset</button>
  <button class="btn br" id="muteBtn" onclick="toggleMute()" title="Toggle voice">🔊</button>
</div>

<script>
// ════════════════════════════
// DATA
// ════════════════════════════
const rawEdges=[
  ["Kondaiya","Narayana"],
  ["Narayana","Pedda Bodiya"],
  ["Pedda Bodiya","Venkataiah"],
  ["Pedda Bodiya","Rangayya"],
  ["Pedda Bodiya","Ramayya"],
  ["Venkataiah","Aswathnarayana"],
  ["Venkataiah","Amanemma_Female"],
  ["Venkataiah","Achamma_Female"],
  ["Venkataiah","Venkataiah_L3_Female"],
  ["Aswathnarayana","Girish"],
  ["Aswathnarayana","Karthik"],
  ["Aswathnarayana","Aswathnarayana_Daughter_Female"],
  ["Rangayya","Pedda_Venkataiah"],
  ["Rangayya","Narayana_R"],
  ["Rangayya","Harinarayana"],
  ["Rangayya","Prahlada"],
  ["Rangayya","Rangayya_Daughter_Female"],
  ["Pedda_Venkataiah","Venkataiah_PV"],
  ["Pedda_Venkataiah","Venkatayya_Daghter_Female"],
  ["Pedda_Venkataiah","Balram"],
  ["Venkataiah_PV","Neelima_Female"],
  ["Venkataiah_PV","Nikhil"],
  ["Balram","SreethanRam"],
  ["Balram","Yashika_Female"],
  ["Narayana_R","BalaKrishna"],
  ["Narayana_R","Narayana_R_Daughter_Female"],
  ["BalaKrishna","Balu_Son"],
  ["BalaKrishna","Jasritha_Female"],
  ["Harinarayana","Pramod"],
  ["Harinarayana","Manasa_Female"],
  ["Prahlada","Durga"],
  ["Prahlada","Swapna_Female"],
  ["Durga","Mahika_Female"],
  ["Ramayya","Timmayya"],
  ["Ramayya","Seshayya"],
  ["Ramayya","Chinna_Venkataiah"],
  ["Ramayya","Ramayya_Daughter_Female"],
  ["Timmayya","Narayana_T"],
  ["Timmayya","Anjaneya_T"],
  ["Timmayya","Timmayya_Daughter_Female"],
  ["Anjaneya_T","Son_A"],
  ["Seshayya","NagaLakshmi_Female"],
  ["Seshayya","Usha_Female"],
  ["Seshayya","Gayatri_Female"],
  ["Chinna_Venkataiah","Narendra"],
  ["Chinna_Venkataiah","Keshava"],
  ["Keshava","Son"],
];
const isFem=id=>id.endsWith('_Female');
const dName=id=>id.replace(/_Female$/,'').replace(/_/g,' ');

// ════════════════════════════
// BUILD TREE
// ════════════════════════════
const cOf={},pOf={},allIds=new Set();
rawEdges.forEach(([p,c])=>{
  allIds.add(p);allIds.add(c);
  (cOf[p]=cOf[p]||[]).push(c);
  pOf[c]=p;
});
const rootId=[...allIds].find(n=>!pOf[n]);
function bh(id){return{id,children:(cOf[id]||[]).map(bh)};}
const tree=bh(rootId);
function flatten(n,a=[]){a.push(n);n.children.forEach(c=>flatten(c,a));return a;}

// lookup map id->node
const nodeMap={};
flatten(tree).forEach(n=>nodeMap[n.id]=n);

// ════════════════════════════
// LAYOUT
// ════════════════════════════
function getGenerations(){
  const gens=[];
  function tr(n,d){(gens[d]=gens[d]||[]).push(n);n.children.forEach(c=>tr(c,d+1));}
  tr(tree,0);return gens;
}
const CHAR_PX=6.5,NODE_PAD=22,MIN_H_GAP=6;
function nodeW(id){return Math.max(60,dName(id).length*CHAR_PX+NODE_PAD+18);}
const NODE_H=26,STAGGER_OFFSET=18;
let scale=1;

function layoutTree(){
  const VW=window.innerWidth,VH=window.innerHeight;
  const TITLE_H=75,GROUND_H=100,CONTROLS_H=50;
  const availH=VH-TITLE_H-GROUND_H-CONTROLS_H,availW=VW-20;
  const gens=getGenerations(),md=gens.length-1;
  function subW(n){
    if(!n.children.length)return nodeW(n.id);
    const s=n.children.reduce((a,c)=>a+subW(c),0)+MIN_H_GAP*(n.children.length-1);
    n._sw=Math.max(nodeW(n.id),s);return n._sw;
  }
  function assignCX(n,left){
    const sw=n._sw||nodeW(n.id);n.cx=left+sw/2;
    if(!n.children.length)return;
    let cur=left;
    n.children.forEach(c=>{assignCX(c,cur);cur+=(c._sw||nodeW(c.id))+MIN_H_GAP;});
  }
  subW(tree);
  const natW=tree._sw;
  scale=Math.min(1,availW/natW);
  assignCX(tree,0);
  const scaledW=natW*scale,offsetX=(availW-scaledW)/2+10;
  const allNodes=flatten(tree);
  allNodes.forEach(n=>{n.cx=n.cx*scale+offsetX;});
  const vStep=md>0?availH/md:availH;
  gens.forEach((gen,gi)=>{
    const baseY=TITLE_H+gi*vStep;
    gen.forEach(n=>n.cy=baseY);
    let needsStagger=false;
    for(let i=1;i<gen.length;i++){
      const gap=gen[i].cx-gen[i-1].cx;
      const minGap=(nodeW(gen[i].id)+nodeW(gen[i-1].id))*scale/2+MIN_H_GAP;
      if(gap<minGap){needsStagger=true;break;}
    }
    if(needsStagger) gen.forEach((n,idx)=>{n.cy=baseY+(idx%2===0?-STAGGER_OFFSET:STAGGER_OFFSET);});
  });
}

// ════════════════════════════
// SVG CHARACTERS
// ════════════════════════════
function maleSVG(c='#4fc3f7'){return `<svg viewBox="0 0 36 56" xmlns="http://www.w3.org/2000/svg">
  <circle cx="18" cy="8" r="6.5" fill="${c}"/>
  <rect x="12" y="16" width="12" height="15" rx="3" fill="${c}"/>
  <line x1="12" y1="19" x2="4"  y2="29" stroke="${c}" stroke-width="3.2" stroke-linecap="round" class="arm-l"/>
  <line x1="24" y1="19" x2="32" y2="29" stroke="${c}" stroke-width="3.2" stroke-linecap="round" class="arm-r"/>
  <line x1="16" y1="31" x2="12" y2="50" stroke="${c}" stroke-width="3.5" stroke-linecap="round" class="leg-l"/>
  <line x1="20" y1="31" x2="24" y2="50" stroke="${c}" stroke-width="3.5" stroke-linecap="round" class="leg-r"/>
</svg>`;}
function femaleSVG(c='#f48fb1'){return `<svg viewBox="0 0 36 56" xmlns="http://www.w3.org/2000/svg">
  <circle cx="18" cy="8" r="6.5" fill="${c}"/>
  <circle cx="18" cy="3" r="3.8" fill="${c}" opacity=".8"/>
  <polygon points="12,17 24,17 28,42 8,42" fill="${c}" opacity=".88"/>
  <rect x="12" y="17" width="12" height="9" rx="2.5" fill="${c}"/>
  <line x1="12" y1="20" x2="4"  y2="30" stroke="${c}" stroke-width="2.8" stroke-linecap="round" class="arm-l"/>
  <line x1="24" y1="20" x2="32" y2="30" stroke="${c}" stroke-width="2.8" stroke-linecap="round" class="arm-r"/>
  <line x1="14" y1="42" x2="12" y2="54" stroke="${c}" stroke-width="3"  stroke-linecap="round" class="leg-l"/>
  <line x1="22" y1="42" x2="24" y2="54" stroke="${c}" stroke-width="3"  stroke-linecap="round" class="leg-r"/>
</svg>`;}
function maleIcon(s=16){return `<svg width="${s}" height="${s}" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="4.5" r="3" fill="#4fc3f7"/><rect x="5" y="8" width="6" height="6" rx="1.5" fill="#4fc3f7"/><line x1="5" y1="9.5" x2="2" y2="13" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="9.5" x2="14" y2="13" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/><line x1="6.5" y1="14" x2="6" y2="16" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/><line x1="9.5" y1="14" x2="10" y2="16" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/></svg>`;}
function femaleIcon(s=16){return `<svg width="${s}" height="${s}" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="4.5" r="3" fill="#f48fb1"/><circle cx="8" cy="2" r="2" fill="#f48fb1" opacity=".8"/><polygon points="5,8 11,8 13,16 3,16" fill="#f48fb1" opacity=".88"/><line x1="5" y1="9.5" x2="2" y2="13" stroke="#f48fb1" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="9.5" x2="14" y2="13" stroke="#f48fb1" stroke-width="1.5" stroke-linecap="round"/></svg>`;}

// ════════════════════════════
// WALK CSS
// ════════════════════════════
const dynStyle=document.createElement('style');document.head.appendChild(dynStyle);
function addWalkCSS(sid,female){
  dynStyle.textContent+=female?`
    @keyframes fleg-${sid}{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(16deg)}}
    #ch-${sid} .leg-l{animation:fleg-${sid} .55s infinite;transform-origin:14px 42px;}
    #ch-${sid} .leg-r{animation:fleg-${sid} .55s infinite reverse;transform-origin:22px 42px;}
  `:`
    @keyframes mleg-${sid}{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
    @keyframes marm-${sid}{0%,100%{transform:rotate(-26deg)}50%{transform:rotate(26deg)}}
    #ch-${sid} .leg-l{animation:mleg-${sid} .5s infinite;transform-origin:16px 31px;}
    #ch-${sid} .leg-r{animation:mleg-${sid} .5s infinite reverse;transform-origin:20px 31px;}
    #ch-${sid} .arm-l{animation:marm-${sid} .5s infinite;transform-origin:12px 19px;}
    #ch-${sid} .arm-r{animation:marm-${sid} .5s infinite reverse;transform-origin:24px 19px;}
  `;
}

// ════════════════════════════
// STAGE REFS
// ════════════════════════════
const stage=document.getElementById('stage');
const canvas=document.getElementById('treeCanvas');
const ctx=canvas.getContext('2d');
const progEl=document.getElementById('progress');
const hintEl=document.getElementById('hint');

let charEls={},nodeEls={},allNodesList=[];
let animQueue=[],genIndex=0;
let running=false,ended=false;
let visibleNodes=new Set();

function addStars(){
  const sky=document.getElementById('sky');
  for(let i=0;i<140;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.2+.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*75}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s;`;
    sky.appendChild(s);
  }
}
function addTufts(){
  const g=document.getElementById('ground');
  for(let i=0;i<Math.floor(window.innerWidth/16);i++){
    const t=document.createElement('div');t.className='tuft';
    t.style.left=(i*16+Math.random()*6)+'px';g.appendChild(t);
  }
}
function nodeFontSize(){return Math.max(7,Math.min(11,Math.round(10*scale)));}
function nodeIconSize(){return Math.max(10,Math.min(16,Math.round(14*scale)));}

function drawConnections(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  allNodesList.forEach(node=>{
    if(!visibleNodes.has(node.id))return;
    node.children.forEach(child=>{
      if(!visibleNodes.has(child.id))return;
      const sx=node.cx,sy=node.cy+NODE_H/2+2;
      const tx=child.cx,ty=child.cy-NODE_H/2-2;
      const midy=(sy+ty)/2;
      ctx.beginPath();ctx.moveTo(sx,sy);
      ctx.bezierCurveTo(sx,midy,tx,midy,tx,ty);
      ctx.strokeStyle=isFem(child.id)?'rgba(255,140,190,.55)':'rgba(80,180,255,.55)';
      ctx.lineWidth=1.4;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    });
  });
}

// ════════════════════════════
// CREATE ELEMENTS
// ════════════════════════════
function createChar(id){
  const female=isFem(id);
  const sid=id.replace(/[^a-zA-Z0-9]/g,'_');
  const fromLeft=Math.random()>.5;
  const el=document.createElement('div');
  el.className='character';el.id=`ch-${sid}`;
  el.innerHTML=`<div class="speech-bubble" id="bub-${sid}">${dName(id)}</div>
    <div class="char-svg">${female?femaleSVG():maleSVG()}</div>`;
  el.style.cssText=`left:${fromLeft?-70:window.innerWidth+70}px;bottom:68px;transition:none;`;
  stage.appendChild(el);
  addWalkCSS(sid,female);
  charEls[id]={el,female,sid,fromLeft};
}

function createNodeBox(node){
  const female=isFem(node.id);
  const fs=nodeFontSize(),is=nodeIconSize();
  const el=document.createElement('div');
  el.className='tree-node';
  el.dataset.id=node.id;
  el.style.cssText=`left:${node.cx}px;top:${node.cy-NODE_H/2}px;opacity:0;`;
  el.innerHTML=`<div class="node-box${female?' f':''}">
    <div class="node-icon" style="width:${is}px;height:${is}px">${female?femaleIcon(is):maleIcon(is)}</div>
    <span class="node-label${female?' fl':''}" style="font-size:${fs}px">${dName(node.id)}</span>
  </div>`;
  el.addEventListener('click',e=>{e.stopPropagation();onNodeClick(node.id,el);});
  stage.appendChild(el);
  nodeEls[node.id]=el;
}

// ════════════════════════════
// SPEECH ENGINE
// ════════════════════════════
let speechEnabled=false, speechQueue=[], isSpeaking=false, muted=false;

function unlockSpeech(){
  speechEnabled=true;
  const u=new SpeechSynthesisUtterance('');u.volume=0;
  window.speechSynthesis.speak(u);
}

function speakText(text, rate=1.0, pitch=1.0){
  if(!speechEnabled||!window.speechSynthesis||muted) return;
  speechQueue.push({text,rate,pitch});
  if(!isSpeaking) drainSpeechQueue();
}

function drainSpeechQueue(){
  if(!speechQueue.length){isSpeaking=false;return;}
  isSpeaking=true;
  const {text,rate,pitch}=speechQueue.shift();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate; u.pitch=pitch; u.volume=1;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang.startsWith('en')&&v.localService)||voices.find(v=>v.lang.startsWith('en'))||null;
  if(v) u.voice=v;
  u.onend=()=>setTimeout(drainSpeechQueue,80);
  u.onerror=()=>setTimeout(drainSpeechQueue,80);
  window.speechSynthesis.speak(u);
}

function stopSpeech(){
  speechQueue=[];isSpeaking=false;
  if(window.speechSynthesis) window.speechSynthesis.cancel();
}

function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
  if(muted) stopSpeech();
}

// ════════════════════════════
// ANIMATION
// ════════════════════════════
const WALK_DUR=2000,PAUSE=1400,FLOAT_DUR=1600,GEN_WAIT=800,STAGGER_PER=320;

function walkCharTo(id,targetX,onDone){
  const {el,fromLeft,sid}=charEls[id];
  if(!fromLeft) el.style.transform='scaleX(-1)';
  el.offsetLeft;
  el.style.transition=`left ${WALK_DUR}ms linear`;
  el.style.left=targetX+'px';
  // show bubble + SPEAK NAME at midpoint of walk
  setTimeout(()=>{
    const b=document.getElementById(`bub-${sid}`);
    if(b) b.style.opacity='1';
    speakText(`I am ${dName(id)}`, 0.95, 1.05);
  }, WALK_DUR*0.5);
  setTimeout(()=>{if(!fromLeft)el.style.transform='scaleX(1)';onDone();},WALK_DUR);
}

function floatUp(id,node,onDone){
  const {el,sid}=charEls[id];
  const b=document.getElementById(`bub-${sid}`);
  if(b)b.style.opacity='0';
  const targetLeft=node.cx-18,targetBottom=window.innerHeight-node.cy-56;
  el.style.transition=`left ${FLOAT_DUR}ms ease-in-out, bottom ${FLOAT_DUR}ms ease-in-out, transform ${FLOAT_DUR}ms ease-in-out, opacity 400ms ${FLOAT_DUR-350}ms`;
  el.style.left=targetLeft+'px';el.style.bottom=targetBottom+'px';
  el.style.transform='scale(0.45)';el.style.opacity='0';
  setTimeout(()=>{
    const ne=nodeEls[id];
    if(ne){
      ne.style.transition='opacity .35s';ne.style.opacity='1';
      ne.classList.add('visible');
      const box=ne.querySelector('.node-box');
      if(box)box.classList.add(isFem(id)?'glow-f':'glow-m');
    }
    visibleNodes.add(id);drawConnections();
    setTimeout(()=>{el.remove();onDone();},350);
  },FLOAT_DUR);
}

function buildQueue(){
  const gens=getGenerations();
  animQueue=gens.map((nodes,gi)=>({nodes,gi}));
}

function runNextGen(){
  if(genIndex>=animQueue.length){
    progEl.textContent='Complete ✦ '+allNodesList.length+' members  ·  Click any name!';
    ended=true;running=false;
    setTimeout(()=>hintEl.classList.add('show'),500);
    return;
  }
  const {nodes,gi}=animQueue[genIndex++];
  progEl.textContent=`Gen ${gi+1}/${animQueue.length}  ·  ${nodes.map(n=>dName(n.id)).join(' · ')}`;
  nodes.forEach(node=>{createChar(node.id);createNodeBox(node);});
  const vw=window.innerWidth,count=nodes.length;
  const spreadW=Math.min(vw-100,count*72),startX=vw/2-spreadW/2;
  let done=0;
  nodes.forEach((node,idx)=>{
    const walkX=count===1?vw/2-18:startX+idx*(spreadW/(count-1)||0)-18;
    setTimeout(()=>{
      walkCharTo(node.id,walkX,()=>{
        setTimeout(()=>{
          floatUp(node.id,node,()=>{
            done++;
            if(done===count)setTimeout(runNextGen,GEN_WAIT);
          });
        },PAUSE);
      });
    },idx*STAGGER_PER);
  });
}

// ════════════════════════════════════════
// INTERACTIVE CLICK — INFO POPUP
// ════════════════════════════════════════
let popupOpen=false;
let selectedNodeId=null;
let typingTimers=[];

function clearTypingTimers(){typingTimers.forEach(t=>clearTimeout(t));typingTimers=[];}

function onNodeClick(id,el){
  if(popupOpen&&selectedNodeId===id){closePopup();return;}
  openPopup(id,el);
}

function openPopup(id,el){
  clearTypingTimers();
  // deselect previous
  if(selectedNodeId&&nodeEls[selectedNodeId]){
    nodeEls[selectedNodeId].querySelector('.node-box').classList.remove('selected');
  }
  selectedNodeId=id;
  el.querySelector('.node-box').classList.add('selected');

  const female=isFem(id);
  const name=dName(id);
  const parentId=pOf[id];
  const parentName=parentId?dName(parentId):null;
  const children=(cOf[id]||[]);
  const childCount=children.length;

  // Build lines data
  const pronoun=female?'Her':'His';
  const lines=[];
  lines.push({icon:female?'👩':'👨', text:`I am <span class="highlight">${name}</span>`});
  if(parentName){
    lines.push({icon:'👴', text:`${pronoun} father is <span class="highlight">${parentName}</span>`});
  } else {
    lines.push({icon:'🌟', text:`I am the <span class="highlight">root ancestor</span> of this family`});
  }
  if(childCount>0){
    const childNames=children.map(c=>dName(c)).join(', ');
    const sons=children.filter(c=>!isFem(c)).length;
    const daughters=children.filter(c=>isFem(c)).length;
    let childDesc='';
    if(sons>0&&daughters>0) childDesc=`${sons} son${sons>1?'s':''} & ${daughters} daughter${daughters>1?'s':''}`;
    else if(sons>0) childDesc=`${sons} son${sons>1?'s':''}`;
    else childDesc=`${daughters} daughter${daughters>1?'s':''}`;
    lines.push({icon:'👶', text:`I have <span class="highlight">${childCount} ${childCount===1?'child':'children'}</span> (${childDesc})`});
  } else {
    lines.push({icon:'🌿', text:`I am a <span class="highlight">leaf</span> of this family tree`});
  }

  // Position popup near the node
  const popup=document.getElementById('info-popup');
  const card=document.getElementById('popup-card');
  const charDiv=document.getElementById('popup-char');
  const linesDiv=document.getElementById('popup-lines');

  // Set card style
  card.className=female?'fc':'';

  // Character in popup
  charDiv.style.animation='none';
  charDiv.innerHTML=female?femaleSVG('#f48fb1'):maleSVG('#4fc3f7');
  charDiv.offsetWidth; // reflow
  charDiv.style.animation='';

  // Clear lines
  linesDiv.innerHTML='';
  lines.forEach(()=>{
    const d=document.createElement('div');
    d.className='pop-line'+(female?' fc-line':'');
    d.innerHTML=`<span class="icon"></span><span class="txt"></span>`;
    linesDiv.appendChild(d);
  });

  // Position popup: try above node, fallback below
  const rect=el.getBoundingClientRect();
  const popW=280,popH=160;
  let left=rect.left+rect.width/2-popW/2;
  let top=rect.top-popH-90; // 90px for the character above card
  if(top<10) top=rect.bottom+10;
  left=Math.max(10,Math.min(window.innerWidth-popW-10,left));
  top=Math.max(10,Math.min(window.innerHeight-popH-10,top));

  popup.style.left=left+'px';
  popup.style.top=top+'px';
  popup.style.width=popW+'px';
  popup.classList.add('show');
  popupOpen=true;

  // ── SPEAK the intro ──
  stopSpeech(); // cancel any in-progress speech
  const pronoun2 = female ? 'Her' : 'His';
  let speech = `I am ${name}. `;
  if(parentName) speech += `${pronoun2} father is ${parentName}. `;
  else speech += `I am the root ancestor of this family. `;
  if(childCount>0){
    const sons=children.filter(c=>!isFem(c)).length;
    const daughters=children.filter(c=>isFem(c)).length;
    speech += `I have ${childCount} ${childCount===1?'child':'children'}`;
    if(sons>0&&daughters>0) speech += `, ${sons} ${sons===1?'son':'sons'} and ${daughters} ${daughters===1?'daughter':'daughters'}`;
    else if(sons>0) speech += `, ${sons} ${sons===1?'son':'sons'}`;
    else speech += `, ${daughters} ${daughters===1?'daughter':'daughters'}`;
    speech += '.';
  } else {
    speech += `I am a leaf of this family tree.`;
  }
  speakText(speech, 0.88, female ? 1.2 : 0.95);

  // Animate character bounce then idle
  setTimeout(()=>{charDiv.classList.add('idle');},500);

  // Type out each line sequentially
  typeLines(lines,linesDiv);
}

function typeLines(lines,container){
  const lineEls=container.querySelectorAll('.pop-line');
  let lineIdx=0;
  function typeNextLine(){
    if(lineIdx>=lines.length)return;
    const line=lines[lineIdx];
    const lineEl=lineEls[lineIdx];
    const iconEl=lineEl.querySelector('.icon');
    const txtEl=lineEl.querySelector('.txt');
    iconEl.textContent=line.icon;
    // Strip HTML tags to get plain text for typing, then reveal HTML at end
    const plainText=line.text.replace(/<[^>]+>/g,'');
    txtEl.innerHTML='<span class="cursor"></span>';
    let charIdx=0;
    function typeChar(){
      if(charIdx<plainText.length){
        // Show plain text while typing
        txtEl.innerHTML=plainText.slice(0,charIdx+1)+'<span class="cursor"></span>';
        charIdx++;
        const t=setTimeout(typeChar,28);
        typingTimers.push(t);
      } else {
        // Done typing this line — reveal rich HTML
        txtEl.innerHTML=line.text;
        lineIdx++;
        const t=setTimeout(typeNextLine,120);
        typingTimers.push(t);
      }
    }
    const t=setTimeout(typeChar,lineIdx*80);
    typingTimers.push(t);
  }
  typeNextLine();
}

function closePopup(){
  clearTypingTimers();
  stopSpeech();
  const popup=document.getElementById('info-popup');
  popup.classList.remove('show');
  popupOpen=false;
  const charDiv=document.getElementById('popup-char');
  charDiv.classList.remove('idle');
  if(selectedNodeId&&nodeEls[selectedNodeId]){
    nodeEls[selectedNodeId].querySelector('.node-box').classList.remove('selected');
  }
  selectedNodeId=null;
}

// Click stage to close popup
stage.addEventListener('click',e=>{
  if(popupOpen&&!e.target.closest('.tree-node')&&!e.target.closest('#info-popup')){
    closePopup();
  }
});

// ════════════════════════════
// CONTROLS
// ════════════════════════════
function startShow(){
  if(running||ended)return;
  unlockSpeech();
  running=true;runNextGen();
}
function resetShow(){
  closePopup();
  stopSpeech();
  running=false;ended=false;genIndex=0;
  visibleNodes.clear();
  hintEl.classList.remove('show');
  Object.values(charEls).forEach(c=>c.el&&c.el.remove&&c.el.remove());
  Object.values(nodeEls).forEach(e=>e.remove());
  charEls={};nodeEls={};progEl.textContent='';
  layoutTree();allNodesList=flatten(tree);buildQueue();drawConnections();
}
function skipToEnd(){
  closePopup();
  stopSpeech();
  running=false;ended=true;
  Object.values(charEls).forEach(c=>c.el&&c.el.remove&&c.el.remove());
  charEls={};
  allNodesList.forEach(node=>{
    if(!nodeEls[node.id])createNodeBox(node);
    nodeEls[node.id].style.opacity='1';
    nodeEls[node.id].classList.add('visible');
    visibleNodes.add(node.id);
  });
  drawConnections();
  progEl.textContent='All '+allNodesList.length+' members  ·  Click any name!';
  setTimeout(()=>hintEl.classList.add('show'),500);
}

// ════════════════════════════
// INIT
// ════════════════════════════
window.addEventListener('load',()=>{
  layoutTree();allNodesList=flatten(tree);
  addStars();addTufts();buildQueue();drawConnections();
  progEl.textContent='Press ▶ Begin to start';
});
window.addEventListener('resize',()=>{
  layoutTree();allNodesList=flatten(tree);
  allNodesList.forEach(node=>{
    const el=nodeEls[node.id];
    if(el){el.style.left=node.cx+'px';el.style.top=(node.cy-NODE_H/2)+'px';}
  });
  drawConnections();
  if(popupOpen)closePopup();
});

// ESC to close
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});
</script>
