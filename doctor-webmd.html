<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor vs WebMD Patient 🏥</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 50%, #e8f5e9 100%);
  font-family: 'Nunito', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; overflow-x: hidden;
}

h1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  letter-spacing: 4px;
  background: linear-gradient(135deg, #00897b, #1565c0, #00897b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  background-size: 300%; animation: titleShimmer 4s linear infinite;
  text-align: center; padding: 16px 20px 4px;
}
@keyframes titleShimmer { 0%{background-position:0%} 100%{background-position:300%} }
.tagline { color:#546e7a; font-size:0.82rem; margin-bottom:10px; letter-spacing:1.5px; text-align:center; font-weight:700; }

.scene-wrapper {
  position: relative;
  width: min(960px, 98vw);
  height: min(540px, 58vw);
  min-height: 320px;
}

#sceneSVG {
  width:100%; height:100%; display:block;
  border-radius:20px;
  box-shadow: 0 0 50px rgba(0,137,123,0.25), 0 8px 40px rgba(0,0,0,0.15);
  border: 3px solid #00897b;
}

/* SPEECH BUBBLES */
.speech-bubble {
  position:absolute; background:white;
  border-radius:16px; padding:10px 14px;
  font-size:clamp(0.62rem,1.4vw,0.85rem);
  font-weight:800; color:#1a237e;
  max-width:230px; text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.18);
  opacity:0; transform:scale(0.4);
  transition:opacity 0.35s cubic-bezier(.34,1.56,.64,1), transform 0.35s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none; line-height:1.45; z-index:20;
  border:3px solid #00897b; white-space:pre-line;
}
.speech-bubble.show { opacity:1; transform:scale(1); }

#bubble-doctor {
  left:4%; top:6%; border-color:#1565c0;
}
#bubble-doctor::after {
  content:''; position:absolute; bottom:-14px; left:28px;
  border:8px solid transparent; border-top-color:white;
}
#bubble-doctor::before {
  content:''; position:absolute; bottom:-18px; left:25px;
  border:10px solid transparent; border-top-color:#1565c0;
}

#bubble-patient {
  right:4%; top:6%; border-color:#e53935; color:#7f0000;
}
#bubble-patient::after {
  content:''; position:absolute; bottom:-14px; right:28px;
  border:8px solid transparent; border-top-color:white;
}
#bubble-patient::before {
  content:''; position:absolute; bottom:-18px; right:25px;
  border:10px solid transparent; border-top-color:#e53935;
}

.webmd-bubble {
  background: #fff3f3 !important;
  border-color: #e53935 !important;
  color: #7f0000 !important;
  font-family: 'Share Tech Mono', monospace !important;
  font-size: clamp(0.58rem,1.2vw,0.78rem) !important;
}
.webmd-bubble::before { border-top-color:#e53935 !important; }

/* float emoji */
.float-emoji {
  position:absolute; font-size:1.6rem;
  animation:floatUp 2s ease-out forwards; pointer-events:none; z-index:30;
}
@keyframes floatUp {
  0%  { opacity:1; transform:translateY(0) scale(1); }
  100%{ opacity:0; transform:translateY(-90px) scale(1.8); }
}

/* CHARACTER ANIMS */
@keyframes idleBob    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes talkWiggle { 0%,100%{transform:translateY(0) rotate(0deg)} 25%{transform:translateY(-7px) rotate(-2deg)} 75%{transform:translateY(-3px) rotate(2deg)} }
@keyframes panicShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px) rotate(-3deg)} 60%{transform:translateX(6px) rotate(3deg)} }
@keyframes facepalm   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px) rotate(2deg)} }

#doctor-char  { transform-origin:220px 400px; }
#patient-char { transform-origin:730px 400px; }

.doctor-idle    #doctor-char  { animation:idleBob    2.5s ease-in-out infinite; }
.patient-idle   #patient-char { animation:idleBob    2.5s ease-in-out infinite 0.5s; }
.doctor-talking #doctor-char  { animation:talkWiggle 0.4s ease-in-out infinite; }
.patient-talking #patient-char{ animation:talkWiggle 0.4s ease-in-out infinite; }
.patient-panic  #patient-char { animation:panicShake 0.25s ease-in-out infinite; }
.doctor-facepalm #doctor-char { animation:facepalm   0.5s ease-in-out infinite; }

/* PROGRESS */
.progress-track {
  width:min(960px,98vw); height:7px;
  background:#b2dfdb; border-radius:10px; margin:10px 0 6px; overflow:hidden;
}
.progress-fill {
  height:100%;
  background:linear-gradient(90deg,#00897b,#1565c0,#00897b);
  background-size:200%; animation:pgFlow 3s linear infinite;
  border-radius:10px; transition:width 0.4s ease; width:0%;
}
@keyframes pgFlow { 0%{background-position:0%} 100%{background-position:200%} }

.status { color:#00695c; font-size:0.82rem; font-weight:700; margin:4px 0 10px; min-height:20px; text-align:center; }

.controls { display:flex; gap:14px; margin-bottom:24px; flex-wrap:wrap; justify-content:center; }
.btn {
  font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem;
  padding:11px 30px; border:none; border-radius:50px; cursor:pointer;
  transition:transform 0.15s, box-shadow 0.15s; letter-spacing:0.5px; min-width:130px;
}
.btn:hover  { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.2); }
.btn:active { transform:translateY(1px); }
.btn:disabled { opacity:0.45; cursor:default; transform:none; }
.btn-play { background:linear-gradient(135deg,#00897b,#00695c); color:white; box-shadow:0 4px 0 #004d40; }
.btn-stop { background:linear-gradient(135deg,#455a64,#263238); color:#cfd8dc; box-shadow:0 4px 0 #111; }
</style>
</head>

<script>
const script = [
  { speaker:'patient', text:'Doctor, I Googled my symptoms.\nI have 7 diseases, 2 syndromes, and possibly a rare condition found only in penguins.', emotion:'😰', state:'panic', isWebmd:true },
  { speaker:'doctor',  text:'Sir... you came in for a headache.', emotion:'😐', state:'talk' },
  { speaker:'patient', text:"That's what the BRAIN TUMOR wants you to think.", emotion:'😱', state:'panic', isWebmd:true },
  { speaker:'doctor',  text:'Your BP is perfectly normal.', emotion:'🩺', state:'talk' },
  { speaker:'patient', text:'WebMD says normal BP is ALSO a symptom of something.', emotion:'😳', state:'panic', isWebmd:true },
  { speaker:'doctor',  text:'...Of WHAT?!', emotion:'😤', state:'facepalm' },
  { speaker:'patient', text:"It didn't specify. But it said see a doctor IMMEDIATELY.", emotion:'📄', state:'panic', isWebmd:true },
  { speaker:'doctor',  text:'You ARE seeing a doctor!!', emotion:'😩', state:'facepalm' },
  { speaker:'patient', text:'Yes but WebMD also said... don\'t trust doctors.', emotion:'🤭', state:'panic', isWebmd:true },
  { speaker:'doctor',  text:'Sir. You have a mild cold.', emotion:'🤦', state:'talk' },
  { speaker:'patient', text:'A mild cold that STARTED in the penguins!', emotion:'🐧', state:'panic', isWebmd:true },
  { speaker:'doctor',  text:'Take this tablet. Drink water. Sleep.', emotion:'💊', state:'talk' },
  { speaker:'patient', text:'WebMD says water can cause overhydration!', emotion:'💧', state:'panic', isWebmd:true },
  { speaker:'doctor',  text:'*picks up phone*\nHello? Management? I need to be admitted.\nI am losing my mind.', emotion:'😵', state:'facepalm' },
  { speaker:'patient', text:"See! Even YOU need a doctor!\nWebMD was RIGHT about everything!!", emotion:'😂', state:'panic', isWebmd:true },
];

// ── VOICES ──────────────────────────────────────────────────────────
const synth = window.speechSynthesis;
let voices = [];
function loadVoices(){ voices = synth.getVoices(); }
loadVoices();
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged = loadVoices;

function getVoice(speaker){
  if(!voices.length) voices = synth.getVoices();
  const en = voices.filter(v=>v.lang.startsWith('en'));
  if(speaker==='doctor'){
    return en.find(v=>/daniel|george|david|mark|james/i.test(v.name))
        || en.find(v=>v.lang==='en-US') || en[0];
  }
  return en.find(v=>/alex|ryan|thomas|oliver/i.test(v.name))
      || en.find(v=>v.lang==='en-US') || en[1] || en[0];
}

function speak(text, speaker, onEnd){
  synth.cancel();
  const clean = text.replace(/[^\w\s,!?.''\-\n*]/g,'').trim();
  const utter = new SpeechSynthesisUtterance(clean);
  utter.pitch  = speaker==='patient' ? 1.2 : 0.9;
  utter.rate   = speaker==='patient' ? 1.1 : 0.88;
  utter.volume = 0.95;
  const v=getVoice(speaker); if(v) utter.voice=v;
  utter.onend  = ()=>onEnd&&onEnd();
  utter.onerror = ()=>onEnd&&onEnd();
  synth.speak(utter);
}

// ── EXPRESSIONS ─────────────────────────────────────────────────────
function setDocMouth(type){
  const m=document.getElementById('doctor-mouth');
  if(type==='open')    m.setAttribute('d','M204,200 Q218,216 232,200');
  else if(type==='facepalm') m.setAttribute('d','M208,202 Q218,206 228,202');
  else                 m.setAttribute('d','M204,200 Q218,208 232,200');
}
function setDocBrows(type){
  // access via querySelector since they don't have IDs
  // we'll use a global reference set below
  if(!window._docBrowL) return;
  if(type==='frustrated'){
    window._docBrowL.setAttribute('d','M182,156 Q196,149 208,154');
    window._docBrowR.setAttribute('d','M228,154 Q240,149 254,156');
  } else {
    window._docBrowL.setAttribute('d','M182,153 Q196,147 208,151');
    window._docBrowR.setAttribute('d','M228,151 Q240,147 254,153');
  }
}
function setPatMouth(type){
  const m=document.getElementById('patient-mouth');
  if(type==='panic')  m.setAttribute('d','M720,208 Q736,200 752,208');
  else if(type==='laugh') m.setAttribute('d','M718,204 Q736,218 754,204');
  else                m.setAttribute('d','M720,204 Q736,212 752,204');
}
function setPatBrows(type){
  const l=document.getElementById('pat-brow-l');
  const r=document.getElementById('pat-brow-r');
  if(type==='panic'){
    l.setAttribute('d','M700,154 Q714,148 724,154');
    r.setAttribute('d','M748,154 Q758,148 772,154');
  } else {
    l.setAttribute('d','M700,158 Q714,150 724,155');
    r.setAttribute('d','M748,155 Q758,150 772,158');
  }
}
function setSweat(show){
  document.getElementById('sweatDrop').style.opacity = show ? '0.8' : '0';
}
function lookAt(speaker){
  const dl=document.getElementById('dPupilL'); const dr=document.getElementById('dPupilR');
  const pl=document.getElementById('pPupilL'); const pr=document.getElementById('pPupilR');
  if(speaker==='doctor'){
    dl.setAttribute('cx','197'); dr.setAttribute('cx','243');
    pl.setAttribute('cx','708'); pr.setAttribute('cx','756');
  } else {
    dl.setAttribute('cx','193'); dr.setAttribute('cx','239');
    pl.setAttribute('cx','716'); pr.setAttribute('cx','764');
  }
}

// grab brow elements
window.addEventListener('load',()=>{
  const paths = document.querySelectorAll('#doctor-char path');
  paths.forEach(p=>{
    const d=p.getAttribute('d')||'';
    if(d.includes('182,153')) window._docBrowL = p;
    if(d.includes('228,151')) window._docBrowR = p;
  });
});

// ── STATE ────────────────────────────────────────────────────────────
let currentIdx=0, isPlaying=false, isPaused=false, timeoutId=null;
const playBtn=document.getElementById('playBtn');
const stopBtn=document.getElementById('stopBtn');

playBtn.addEventListener('click',()=>{
  if(!isPlaying && currentIdx===0){
    isPlaying=true; isPaused=false; stopBtn.disabled=false;
    playBtn.textContent='⏸ Pause';
    document.getElementById('status').textContent='🎬 Consultation begins...';
    setTimeout(showNext,600);
  } else if(!isPlaying && currentIdx>=script.length){
    resetScene(); isPlaying=true; isPaused=false; stopBtn.disabled=false;
    playBtn.textContent='⏸ Pause'; setTimeout(showNext,600);
  } else if(isPlaying && !isPaused){
    isPaused=true; clearTimeout(timeoutId); synth.pause();
    playBtn.textContent='▶ Resume';
    document.getElementById('status').textContent='⏸ Paused';
  } else if(isPaused){
    isPaused=false; synth.resume(); playBtn.textContent='⏸ Pause'; showNext();
  }
});

stopBtn.addEventListener('click',()=>{ resetScene(); stopBtn.disabled=true; });

function showNext(){
  if(!isPlaying||isPaused) return;
  if(currentIdx>=script.length){
    isPlaying=false; playBtn.textContent='↺ Replay';
    document.getElementById('progressFill').style.width='100%';
    document.getElementById('status').textContent='😂 WebMD wins again! Doctor needs a doctor!';
    hideBubbles(); setCharState('doctor','idle');
    return;
  }
  const item = script[currentIdx];
  document.getElementById('progressFill').style.width=(currentIdx/script.length*100)+'%';

  setCharState(item.speaker, item.state);
  lookAt(item.speaker);

  // expressions
  if(item.speaker==='patient'){
    setPatBrows(item.state==='panic'?'panic':'normal');
    setPatMouth(item.state==='panic'?'panic':item.emotion==='😂'?'laugh':'normal');
    setSweat(item.state==='panic');
  } else {
    setDocMouth(item.state==='facepalm'?'facepalm':item.state==='open'?'open':'talk');
    setDocBrows(item.state==='facepalm'?'frustrated':'normal');
  }

  const label = item.speaker==='doctor'?'👨‍⚕️ Dr. Ramesh':'🤒 Patient';
  const short  = item.text.replace(/\n/g,' ').substring(0,55);
  document.getElementById('status').textContent=`${label}: "${short}${item.text.length>55?'...':''}"`;

  showBubble(item.speaker, item.text, item.isWebmd||false);
  spawnEmoji(item.speaker, item.emotion);

  speak(item.text, item.speaker, ()=>{
    if(isPlaying&&!isPaused){
      timeoutId=setTimeout(()=>{ currentIdx++; showNext(); }, 700);
    }
  });
}

function setCharState(speaker, state){
  const svg=document.getElementById('sceneSVG');
  svg.className='';
  const cssState = state==='panic'?'panic':state==='facepalm'?'facepalm':'talking';
  svg.classList.add(`${speaker}-${cssState}`);
  const other = speaker==='doctor'?'patient':'doctor';
  svg.classList.add(`${other}-idle`);
}

function showBubble(speaker, text, isWebmd){
  hideBubbles();
  const el=document.getElementById(`bubble-${speaker}`);
  el.className='speech-bubble'+(isWebmd?' webmd-bubble':'');
  el.style.whiteSpace='pre-line'; el.textContent=text;
  setTimeout(()=>el.classList.add('show'),30);
}
function hideBubbles(){
  document.getElementById('bubble-doctor').classList.remove('show');
  document.getElementById('bubble-patient').classList.remove('show');
}
function spawnEmoji(speaker, emoji){
  const w=document.querySelector('.scene-wrapper'); if(!w) return;
  const el=document.createElement('div'); el.className='float-emoji'; el.textContent=emoji;
  el.style.left=speaker==='doctor'?(60+Math.random()*100)+'px':(680+Math.random()*100)+'px';
  el.style.top='160px'; w.appendChild(el); setTimeout(()=>el.remove(),2100);
}

function resetScene(){
  clearTimeout(timeoutId); synth.cancel();
  isPlaying=false; isPaused=false; currentIdx=0;
  hideBubbles(); setSweat(false);
  playBtn.textContent='▶ Play';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('status').textContent='Press ▶ Play to start the consultation! 🏥';
  setPatBrows('normal'); setPatMouth('normal'); setDocMouth('normal'); setDocBrows('normal');
  document.getElementById('sceneSVG').className='';
}
</script>
</body>
</html>
