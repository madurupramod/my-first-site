<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌈 Story World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
        text-align: center;
        color: white;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    h1 { margin-top: 50px; font-size: 3rem; }

    .story-container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 30px;
        margin-bottom: 60px;
    }

    .story-card {
        background: white;
        color: #444;
        width: 250px;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        transition: transform 0.3s;
    }

    .story-card:hover {
        transform: scale(1.1);
    }

    .story-card button {
        padding: 10px 20px;
        border: none;
        border-radius: 20px;
        background: #ff6f61;
        color: white;
        cursor: pointer;
    }

    /* GAME OVERLAY */
    #gameOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: none;
        z-index: 999;
        color: black;
        overflow: auto;
    }

    #emojiBox { font-size: 80px; margin: 20px; }

    #gameArea {
        position: relative;
        height: 300px;
        width: 90%;
        max-width: 400px;
        margin: 20px auto;
        border: 2px dashed #aaa;
        background: #fff;
    }

    .letter {
        position: absolute;
        font-size: 30px;
        font-weight: bold;
    }

    input { padding: 10px; font-size: 16px; }

    .btn { padding: 10px; margin: 5px; }

</style>
</head>

<body>

<h1>📚 Story World 🌟</h1>

<div class="story-container">

    <!-- EXISTING STORIES (unchanged) -->
    <div class="story-card">
        <h2>🦁 My Life</h2>
        <button onclick="openStory('My Life.html')">Read</button>
    </div>

    <!-- ADD GAME CARD -->
    <div class="story-card">
        <h2>🎮 Guess the Name Game</h2>
        <button onclick="openGame()">Play Game</button>
    </div>

</div>

<!-- GAME OVERLAY -->
<div id="gameOverlay">
    <h2>🎯 Guess the Name</h2>
    <button onclick="closeGame()">❌ Close</button>

    <div id="emojiBox"></div>
    <div id="gameArea"></div>

    <input type="text" id="answer" placeholder="Enter name">
    <br>
    <button class="btn" onclick="checkAnswer()">Submit</button>
    <button class="btn" onclick="loadGame()">Next</button>

    <div id="result"></div>
</div>

<script>
function openStory(page){ window.location.href = page; }

function openGame(){
    document.getElementById("gameOverlay").style.display = "block";
    loadGame();
}

function closeGame(){
    document.getElementById("gameOverlay").style.display = "none";
}

const items = [
  {name:"lion",emoji:"🦁"},{name:"tiger",emoji:"🐯"},
  {name:"elephant",emoji:"🐘"},{name:"zebra",emoji:"🦓"},
  {name:"giraffe",emoji:"🦒"},{name:"dog",emoji:"🐶"},
  {name:"cat",emoji:"🐱"},{name:"horse",emoji:"🐴"},
  {name:"cow",emoji:"🐄"},{name:"goat",emoji:"🐐"},
  {name:"parrot",emoji:"🦜"},{name:"eagle",emoji:"🦅"},
  {name:"peacock",emoji:"🦚"},{name:"owl",emoji:"🦉"},
  {name:"duck",emoji:"🦆"},{name:"car",emoji:"🚗"},
  {name:"bus",emoji:"🚌"},{name:"train",emoji:"🚆"},
  {name:"bike",emoji:"🏍️"},{name:"ship",emoji:"🚢"}
];

let currentWord="";

function loadGame(){
    const random = items[Math.floor(Math.random()*items.length)];
    currentWord = random.name;

    document.getElementById("emojiBox").innerText = random.emoji;
    document.getElementById("answer").value="";
    document.getElementById("result").innerText="";

    displayLetters(random.name);
}

function displayLetters(word){
    const area = document.getElementById("gameArea");
    area.innerHTML="";

    word.split('').sort(()=>Math.random()-0.5).forEach((c,i)=>{
        const d=document.createElement("div");
        d.className="letter";
        d.innerText=c.toUpperCase();
        d.style.left=Math.random()*300+"px";
        d.style.top=(i%2?180:50)+Math.random()*40+"px";
        area.appendChild(d);
    });
}

function checkAnswer(){
    const val=document.getElementById("answer").value.toLowerCase();
    document.getElementById("result").innerText =
        val===currentWord ? "✅ Correct!" : "❌ Try Again";
}

</script>

</body>
</html>
