<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Life — M. Pramod</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Nunito',sans-serif}

.stage-wrap{
  width:720px;max-width:98vw;
  background:#fff;border-radius:20px;
  overflow:hidden;box-shadow:0 20px 60px #0008;
  position:relative;
}

.scene-title{
  position:absolute;top:14px;left:16px;z-index:20;
  background:#1a2233ee;color:#FFE082;
  font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:600;
  padding:5px 14px;border-radius:30px;letter-spacing:0.5px;
  transition:opacity 0.4s;
}

.controls{
  position:absolute;bottom:12px;right:14px;z-index:20;
  display:flex;gap:8px;
}
.btn{
  background:#1a2233ee;color:#fff;border:none;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  padding:7px 18px;border-radius:30px;cursor:pointer;
  letter-spacing:0.3px;transition:background 0.2s,transform 0.1s;
}
.btn:hover{background:#2e4a8aee}
.btn:active{transform:scale(0.96)}

.progress-bar{
  position:absolute;bottom:0;left:0;height:4px;
  background:linear-gradient(90deg,#4fc3f7,#7c4dff);
  transition:width 0.15s linear;z-index:20;
  border-radius:0;
}

canvas{display:block;width:100%}

.bubble-container{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:15;
}
</style>
</head>
<body>
<div class="stage-wrap" id="wrap">
  <canvas id="c"></canvas>
  <div class="bubble-container"><canvas id="bubbleCanvas"></canvas></div>
  <div class="scene-title" id="timeTag">—</div>
  <div class="controls">
    <button class="btn" id="playBtn" onclick="handleBtn()">▶ Play</button>
  </div>
  <div class="progress-bar" id="pbar" style="width:0%"></div>
</div>

<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
const bc=document.getElementById('bubbleCanvas');
const bctx=bc.getContext('2d');
const W=720,H=440;
c.width=W;c.height=H;
bc.width=W;bc.height=H;
bc.style.position='absolute';bc.style.top='0';bc.style.left='0';

const timeTag=document.getElementById('timeTag');
const playBtn=document.getElementById('playBtn');
const pbar=document.getElementById('pbar');

const GROUND=H-60;
let tick=0,sceneIdx=0,started=false,done=false;
let displayText='',targetText='',charIdx=0;
let typeTimer=null,autoTimer=null,raf=null;
let manX=80,targetX=350;
let sceneProgress=0;
let transitioning=false;

const scenes=[
  {time:'Hello! 👋',sky:'day',text:"Hi! I am M. Pramod, studying 7th class. Let me show you my boring daily life!",pose:'wave',walkTo:360,messy:false,bg:'school'},
  {time:'6:00 AM 😴',sky:'morning',text:"I wake up at 6 AM and rush to tuition — no brushing, no combing! Super messy!",pose:'walk',walkTo:140,messy:true,bg:'home'},
  {time:'Tuition 💤',sky:'morning',text:"Sir comes late. Sleep hits me hard. I put my head on the bag and doze off... zzz",pose:'sleep',walkTo:190,messy:true,bg:'tuition'},
  {time:'Tuition 🚶',sky:'morning',text:"Can't sleep? I walk around, chat with friends, enjoy! Sometimes sir doesn't come at all!",pose:'walk',walkTo:480,messy:true,bg:'tuition'},
  {time:'8:00 AM 🏠',sky:'morning',text:"Back home at 8! Brush teeth, take bath, eat tiffin — then off to school!",pose:'walk',walkTo:220,messy:false,bg:'home'},
  {time:'School 📚',sky:'day',text:"Every day we pray for a holiday! Interval at 11:15. Lunch at 12:50 — best part!",pose:'stand',walkTo:350,messy:false,bg:'school'},
  {time:'1:50 PM 😩',sky:'noon',text:"1:50 PM — back to class. It is SO painful! Another interval saves us at 3:00.",pose:'sad',walkTo:250,messy:false,bg:'school'},
  {time:'4:40 PM 🏃',sky:'noon',text:"4:40 PM — finally leave for home! But 5:00 PM tuition again. So boring, no rest!",pose:'walk',walkTo:520,messy:false,bg:'road'},
  {time:'7:00 PM 🎉',sky:'evening',text:"7:00 PM — we are FINALLY FREE! School AND tuition over! Time to play computer games!",pose:'happy',walkTo:350,messy:false,bg:'home'},
  {time:'10:30 PM 😪',sky:'night',text:"10:30 PM — time to sleep. My life is very boring. Please don't waste yours like this!",pose:'sleep2',walkTo:360,messy:false,bg:'home'},
  {time:'Moral 💡',sky:'day',text:"But remember: when exams are tomorrow — study like a mad person! NEVER neglect your exams!",pose:'wave',walkTo:370,messy:false,bg:'school'},
];

const SKIES={
  morning:{horizon:'#FDDDA0',sky:'#F7A860',ground:'#A8C870',road:'#888'},
  day:    {horizon:'#B8E4FF',sky:'#5BB8F5',ground:'#6EC850',road:'#777'},
  noon:   {horizon:'#87CEEB',sky:'#4FA8D4',ground:'#5D9E40',road:'#666'},
  evening:{horizon:'#F4844A',sky:'#C0472A',ground:'#4A7A2A',road:'#555'},
  night:  {horizon:'#1E2E50',sky:'#101828',ground:'#1a3020',road:'#333'},
};

function lerp(a,b,t){return a+(b-a)*t}

function drawBackground(sky,bg){
  const s=SKIES[sky]||SKIES.day;
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,s.sky);g.addColorStop(1,s.horizon);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,GROUND);

  // Sun/Moon
  if(sky==='night'){
    ctx.fillStyle='#FFE97A';ctx.shadowBlur=18;ctx.shadowColor='#FFE97Acc';
    ctx.beginPath();ctx.arc(W-100,55,20,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    for(let i=0;i<32;i++){const sx=(i*97+41)%W,sy=(i*53+17)%(GROUND*0.7);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,1.2,0,Math.PI*2);ctx.fill();}
  } else if(sky==='morning'){
    ctx.fillStyle='#FFE030';ctx.shadowBlur=22;ctx.shadowColor='#FFD700aa';
    ctx.beginPath();ctx.arc(80,70,30,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  } else if(sky==='evening'){
    ctx.fillStyle='#FF8040';ctx.shadowBlur=30;ctx.shadowColor='#FF6020bb';
    ctx.beginPath();ctx.arc(W-90,85,34,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  } else {
    ctx.fillStyle='#FFF176';ctx.shadowBlur=18;ctx.shadowColor='#FFE57Aaa';
    ctx.beginPath();ctx.arc(W-90,60,28,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  // Clouds
  drawCloud(140+(tick*0.3)%800-200,60,70,20,sky);
  drawCloud(420+(tick*0.2)%800-200,40,55,16,sky);
  drawCloud(600+(tick*0.15)%900-300,75,45,14,sky);

  // Ground
  ctx.fillStyle=s.ground;ctx.fillRect(0,GROUND,W,H-GROUND);

  // Road markings
  ctx.fillStyle='#555';ctx.fillRect(0,H-58,W,58);
  ctx.fillStyle='#fff';
  for(let i=0;i<9;i++){const ox=((tick*2)%80);ctx.fillRect(i*80+ox-80,H-33,45,6);}

  // BG buildings / elements
  if(bg==='school'||bg==='road'){drawSchoolBuilding(450,GROUND);}
  if(bg==='home'||bg==='road'){drawHouse(70,GROUND);}
  if(bg==='tuition'){drawTuitionRoom(440,GROUND);}
  drawTrees(sky);
}

function drawCloud(x,y,w,h,sky){
  const alpha=sky==='night'?0.15:0.65;
  ctx.fillStyle=`rgba(255,255,255,${alpha})`;
  ctx.beginPath();
  ctx.ellipse(x,y,w,h,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x-w*0.35,y+h*0.1,w*0.55,h*0.7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+w*0.4,y+h*0.1,w*0.5,h*0.7,0,0,Math.PI*2);ctx.fill();
}

function drawHouse(x,y){
  ctx.fillStyle='#D4956A';ctx.fillRect(x,y-70,80,70);
  ctx.fillStyle='#C0392B';
  ctx.beginPath();ctx.moveTo(x-10,y-70);ctx.lineTo(x+40,y-110);ctx.lineTo(x+90,y-70);ctx.closePath();ctx.fill();
  ctx.fillStyle='#87CEEB';ctx.fillRect(x+10,y-55,22,20);ctx.fillRect(x+50,y-55,22,20);
  ctx.fillStyle='#5A3A1A';ctx.fillRect(x+32,y-30,18,30);
}

function drawSchoolBuilding(x,y){
  ctx.fillStyle='#E8D5B7';ctx.fillRect(x-55,y-110,110,110);
  ctx.fillStyle='#C9A87A';ctx.fillRect(x-65,y-95,15,95);ctx.fillRect(x+50,y-95,15,95);
  ctx.fillStyle='#8B4513';ctx.font='bold 10px Nunito,sans-serif';ctx.textAlign='center';
  ctx.fillText('SCHOOL',x,y-96);
  ctx.fillStyle='#87CEEB';
  for(let row=0;row<2;row++) for(let col=0;col<3;col++){
    const wx=x-38+col*28,wy=y-80+row*28;
    ctx.fillRect(wx,wy,20,16);
    ctx.strokeStyle='#8B6914';ctx.lineWidth=0.8;ctx.strokeRect(wx,wy,20,16);
  }
  ctx.fillStyle='#5A3A1A';ctx.fillRect(x-10,y-26,20,26);
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x,y-65,8,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#AA8800';ctx.lineWidth=0.8;ctx.stroke();
}

function drawTuitionRoom(x,y){
  ctx.fillStyle='#B8C4D4';ctx.fillRect(x-50,y-90,100,90);
  ctx.fillStyle='#888';ctx.font='bold 9px Nunito,sans-serif';ctx.textAlign='center';
  ctx.fillText('TUITION',x,y-76);
  ctx.fillStyle='#5A7A9A';ctx.fillRect(x-30,y-66,20,30);ctx.fillRect(x+10,y-66,20,30);
  ctx.fillStyle='#5A3A1A';ctx.fillRect(x-10,y-22,20,22);
}

function drawTrees(sky){
  [[100,0],[250,0],[550,0],[660,0]].forEach(([x,o])=>drawTree(x,GROUND,sky,o));
}

function drawTree(x,y,sky,off){
  ctx.fillStyle=sky==='night'?'#4A3820':'#6B4226';
  ctx.fillRect(x-5,y-42,10,42);
  const col=sky==='night'?'#1A3A24':sky==='evening'?'#2D5A34':'#2D8A3E';
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(x,y-58,24,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-10,y-46,16,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+10,y-46,16,0,Math.PI*2);ctx.fill();
}

// ---- CHARACTER DRAWING ----
function drawCharacter(x,y,pose,messy,sky){
  ctx.save();ctx.translate(x,y);
  const t=tick;

  if(pose==='sleep'||pose==='sleep2'){
    drawSleeping(t,messy);
  } else {
    const sw=(pose==='walk')?Math.sin(t*0.18)*16:0;
    const bob=(pose==='walk')?Math.abs(Math.sin(t*0.18))*4:0;
    const by=-bob;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath();ctx.ellipse(0,2,22,6,0,0,Math.PI*2);ctx.fill();

    // Legs
    const lkA=sw*0.05,rkA=-sw*0.05;
    drawLimb(ctx,-9,-30+by,lkA,12,34,'#263B7A','#1a2a55');// left leg
    drawLimb(ctx,9,-30+by,rkA,12,34,'#263B7A','#1a2a55');// right leg
    // Shoes
    const lfoot=rotatePoint(-9,4+by-30,lkA,0,34);
    const rfoot=rotatePoint(9,4+by-30,rkA,0,34);
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();ctx.ellipse(lfoot.x,lfoot.y,10,5,lkA,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(rfoot.x,rfoot.y,10,5,rkA,0,Math.PI*2);ctx.fill();

    // Body / shirt
    ctx.fillStyle='#4A90D9';
    roundRect(ctx,-14,-70+by,28,40,6);ctx.fill();
    // Collar
    ctx.fillStyle='#FDBCB4';
    ctx.beginPath();ctx.moveTo(-6,-70+by);ctx.lineTo(0,-62+by);ctx.lineTo(6,-70+by);ctx.closePath();ctx.fill();

    // Arms
    const waveA=pose==='wave'?(-1.1+Math.sin(t*0.14)*0.4):sw*0.045+0.3;
    const otherA=pose==='wave'?0.3:-(sw*0.045+0.3);
    drawLimb(ctx,-14,-64+by,waveA,10,28,'#4A90D9','#3070B0');
    drawLimb(ctx,14,-64+by,otherA,10,28,'#4A90D9','#3070B0');
    // Hands
    const lhand=rotatePoint(-14,-64+by,waveA,0,28);
    const rhand=rotatePoint(14,-64+by,otherA,0,28);
    ctx.fillStyle='#FDBCB4';
    ctx.beginPath();ctx.arc(lhand.x,lhand.y,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(rhand.x,rhand.y,6,0,Math.PI*2);ctx.fill();

    // Head
    ctx.fillStyle='#FDBCB4';ctx.strokeStyle='#E8A090';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(0,-86+by,17,0,Math.PI*2);ctx.fill();ctx.stroke();

    // Hair
    if(messy){
      ctx.strokeStyle='#2C1800';ctx.lineWidth=2;ctx.lineCap='round';
      for(let i=-4;i<=4;i++){
        ctx.beginPath();ctx.moveTo(i*3.5,-100+by);ctx.lineTo(i*3.5+Math.sin(i+t*0.08)*5,-110+by+Math.abs(i)*0.8);ctx.stroke();
      }
    } else {
      ctx.fillStyle='#2C1800';
      ctx.beginPath();ctx.arc(0,-99+by,12,Math.PI,0,false);
      ctx.quadraticCurveTo(18,-96+by,17,-88+by);
      ctx.quadraticCurveTo(-17,-96+by,-17,-88+by);
      ctx.closePath();ctx.fill();
    }

    // Eyes
    ctx.fillStyle='#1a1a1a';
    if(pose==='sad'){
      ctx.beginPath();ctx.arc(-6,-88+by,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(6,-88+by,2.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#AA3322';ctx.lineWidth=1.5;ctx.beginPath();
      ctx.arc(0,-82+by,5,0.2,Math.PI-0.2);ctx.stroke();
      // Tear
      ctx.fillStyle='#5599FF';
      ctx.beginPath();ctx.arc(-7,-85+by,2,0,Math.PI*2);ctx.fill();
    } else if(pose==='happy'){
      ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(-6,-88+by,3,Math.PI,0);ctx.stroke();
      ctx.beginPath();ctx.arc(6,-88+by,3,Math.PI,0);ctx.stroke();
      ctx.strokeStyle='#C0392B';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(0,-83+by,5,0,Math.PI);ctx.stroke();
      // Stars
      ctx.fillStyle='#FFD700';ctx.font='14px sans-serif';ctx.textAlign='center';
      ctx.fillText('★',22,-88+by);ctx.fillText('★',-22,-90+by);
    } else {
      ctx.beginPath();ctx.arc(-6,-88+by,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(6,-88+by,2.5,0,Math.PI*2);ctx.fill();
    }
    // Nose dot
    ctx.fillStyle='#C8906A';ctx.beginPath();ctx.arc(0,-85+by,1.2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function rotatePoint(ox,oy,angle,dx,dy){
  const nx=ox+dx*Math.sin(angle),ny=oy+dy*Math.cos(angle)+dy;
  return {x:nx,y:ny};
}

function drawLimb(ctx,x,y,angle,w,len,col1,col2){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle=col1;
  roundRect(ctx,-w/2,0,w,len,w/2);ctx.fill();
  ctx.restore();
}

function drawSleeping(t,messy){
  // Body on floor
  ctx.fillStyle='#4A90D9';
  ctx.beginPath();ctx.ellipse(0,-36,28,14,0.15,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#FDBCB4';ctx.strokeStyle='#E8A090';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(24,-32,15,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Hair
  if(messy){
    ctx.strokeStyle='#2C1800';ctx.lineWidth=2;
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(24+i*3,-44);ctx.lineTo(24+i*3+Math.sin(i)*3,-52+Math.abs(i)*0.5);ctx.stroke();}
  } else {
    ctx.fillStyle='#2C1800';ctx.beginPath();ctx.arc(24,-42,10,Math.PI,0,false);ctx.fill();
  }
  // Closed eyes
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(19,-34,3.5,Math.PI,0);ctx.stroke();
  ctx.beginPath();ctx.arc(28,-34,3,Math.PI,0);ctx.stroke();
  // Zzz
  const zScale=0.8+Math.sin(t*0.05)*0.2;
  ctx.fillStyle='#7B8FC2';ctx.font=`bold ${Math.round(14*zScale)}px Nunito,sans-serif`;ctx.textAlign='left';
  ctx.fillText('z',44,-44);
  ctx.font=`bold ${Math.round(11*zScale)}px Nunito,sans-serif`;ctx.fillText('z',54,-52);
  ctx.font=`bold ${Math.round(9*zScale)}px Nunito,sans-serif`;ctx.fillText('z',62,-58);
  // Legs
  ctx.fillStyle='#263B7A';
  ctx.beginPath();ctx.ellipse(-10,-28,22,9,-0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-8,-20,20,8,0.1,0,Math.PI*2);ctx.fill();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ---- SPEECH BUBBLE ----
function drawBubble(mx,my,text,pose){
  if(!text)return;
  bctx.clearRect(0,0,W,H);
  const isSleeping=pose==='sleep'||pose==='sleep2';
  const headY=my+(isSleeping?-50:-105);
  const cx=Math.min(Math.max(mx,155),W-155);
  const bw=300,bh=96,bx=cx-bw/2,by=headY-bh-24;

  // Shadow
  bctx.fillStyle='rgba(0,0,0,0.08)';
  bctx.beginPath();bctx.ellipse(cx,by+bh+20,bw/2-10,8,0,0,Math.PI*2);bctx.fill();

  // Bubble body
  bctx.fillStyle='#fff';bctx.strokeStyle='#4A90D9';bctx.lineWidth=2;
  bctx.shadowBlur=12;bctx.shadowColor='rgba(74,144,217,0.25)';
  roundRectB(bctx,bx,by,bw,bh,14);bctx.fill();bctx.shadowBlur=0;bctx.stroke();

  // Tail dots (cloud style)
  const tailX=Math.min(Math.max(mx,bx+20),bx+bw-20);
  bctx.fillStyle='#fff';bctx.strokeStyle='#4A90D9';bctx.lineWidth=1.5;
  [{x:tailX,y:by+bh+2,r:7},{x:tailX+4,y:by+bh+10,r:5},{x:tailX+8,y:by+bh+17,r:3.5}].forEach(d=>{
    bctx.beginPath();bctx.arc(d.x,d.y,d.r,0,Math.PI*2);bctx.fill();bctx.stroke();
  });

  // Text
  bctx.fillStyle='#1a2233';bctx.font='500 13px Nunito,sans-serif';bctx.textAlign='center';
  const words=text.split(' '),lineH=19,maxW=bw-32;
  let line='',lines=[];
  words.forEach(w=>{
    const test=line+w+' ';
    if(bctx.measureText(test).width>maxW&&line){lines.push(line.trim());line=w+' ';}
    else line=test;
  });
  lines.push(line.trim());
  const startY=by+18+(bh-lines.length*lineH)/2;
  lines.forEach((l,i)=>bctx.fillText(l,cx,startY+i*lineH));
}

function roundRectB(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ---- TYPING ----
let typingDone=false;
function startTyping(text){
  targetText=text;displayText='';charIdx=0;typingDone=false;
  clearInterval(typeTimer);
  typeTimer=setInterval(()=>{
    if(charIdx<targetText.length){
      displayText+=targetText[charIdx++];
    } else {
      typingDone=true;clearInterval(typeTimer);
    }
  },28);
}

// ---- SPEECH ----
// speechDone gates auto-advance — we never cancel mid-sentence automatically
let speechDone=false;
let currentUtterance=null;

function speakText(text){
  speechDone=false;
  if(!window.speechSynthesis){speechDone=true;return;}
  // Cancel only previous speech, then wait a tick before queuing new one
  // so the browser doesn't swallow the new utterance
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.82;   // slightly slower = full sentence plays comfortably
    u.pitch=1.05;
    u.lang='en-US';
    const voices=window.speechSynthesis.getVoices();
    const pref=voices.find(v=>v.lang==='en-US'&&/google|samantha|karen|zira/i.test(v.name))||
                voices.find(v=>v.lang.startsWith('en-US'))||
                voices.find(v=>v.lang.startsWith('en'))||
                (voices.length?voices[0]:null);
    if(pref)u.voice=pref;
    u.onend  =()=>{speechDone=true;tryAutoAdvance();};
    u.onerror=()=>{speechDone=true;tryAutoAdvance();};
    currentUtterance=u;
    window.speechSynthesis.speak(u);
  },180);
}

// Auto-advance fires only when BOTH typing and speech are finished
// AND at least ~3s have passed so the scene isn't jarring
function tryAutoAdvance(){
  if(typingDone&&speechDone&&sceneProgress>180&&!autoTimer&&!done){
    autoTimer=setTimeout(()=>{autoTimer=null;sceneIdx++;loadScene(sceneIdx);},900);
  }
}

// ---- SCENE MANAGEMENT ----
function loadScene(idx){
  if(idx>=scenes.length){
    done=true;playBtn.textContent='↺ Replay';
    if(window.speechSynthesis)window.speechSynthesis.cancel();
    return;
  }
  const s=scenes[idx];
  targetX=s.walkTo;
  sceneProgress=0;typingDone=false;speechDone=false;displayText='';
  clearTimeout(autoTimer);autoTimer=null;
  timeTag.textContent=s.time;
  startTyping(s.text);
  speakText(s.text);
  pbar.style.width=((idx+1)/scenes.length*100)+'%';
}

// ---- MAIN LOOP ----
function loop(){
  tick++;
  ctx.clearRect(0,0,W,H);
  const s=scenes[Math.min(sceneIdx,scenes.length-1)];

  drawBackground(s.sky||'day',s.bg||'school');

  if(Math.abs(manX-targetX)>1.5) manX+=(targetX-manX)*0.045;
  drawCharacter(manX,GROUND,s.pose,!!s.messy,s.sky);
  drawBubble(manX,GROUND,displayText,s.pose);

  sceneProgress++;
  // Check advance every frame once typing is done
  if(typingDone&&speechDone&&sceneProgress>180&&!autoTimer&&!done){
    tryAutoAdvance();
  }

  raf=requestAnimationFrame(loop);
}

function handleBtn(){
  if(done){
    done=false;sceneIdx=0;manX=-80;displayText='';
    playBtn.textContent='⏭ Skip';
    loadScene(0);return;
  }
  if(!started){
    started=true;playBtn.textContent='⏭ Skip';
    manX=-80;loadScene(0);
    if(!raf)loop();
    return;
  }
  // Manual skip: cancel speech, jump to next scene
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  clearTimeout(autoTimer);autoTimer=null;clearInterval(typeTimer);
  sceneIdx++;loadScene(sceneIdx);
}

// Preload voices before first use
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

// Draw initial frame
loop();
</script>
