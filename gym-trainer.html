<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Trainer vs Lazy Member 💪😴</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --red: #f44336; --orange: #ff6f00; --yellow: #ffd600;
  --dark: #0d0d0d; --darker: #060606;
  --trainer-color: #ff6f00; --member-color: #42a5f5;
}
* { box-sizing:border-box; margin:0; padding:0; }

body {
  background: linear-gradient(135deg, #1a0000 0%, #0d0d0d 50%, #001a00 100%);
  font-family: 'Nunito', sans-serif;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; overflow-x:hidden;
}

h1 {
  font-family:'Bebas Neue', cursive;
  font-size:clamp(2rem,5vw,3.4rem);
  letter-spacing:6px;
  background:linear-gradient(90deg,#ff6f00,#ffd600,#ff6f00,#ffd600);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  background-size:300%; animation:shimmer 3s linear infinite;
  text-align:center; padding:16px 20px 2px;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.tagline{color:#ffcc80;font-size:0.82rem;margin-bottom:10px;letter-spacing:2px;text-align:center;font-weight:700;text-transform:uppercase;}

.scene-wrapper{
  position:relative;
  width:min(960px,98vw);
  height:min(540px,58vw);
  min-height:320px;
}

#sceneSVG{
  width:100%;height:100%;display:block;
  border-radius:20px;
  box-shadow:0 0 60px rgba(255,111,0,0.3),0 8px 40px rgba(0,0,0,0.6);
  border:3px solid #ff6f00;
}

/* SPEECH BUBBLES */
.speech-bubble{
  position:absolute; background:#111;
  border-radius:16px; padding:10px 14px;
  font-size:clamp(0.6rem,1.35vw,0.84rem);
  font-weight:800; color:#fff;
  max-width:230px; text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  opacity:0; transform:scale(0.4);
  transition:opacity 0.35s cubic-bezier(.34,1.56,.64,1),transform 0.35s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none; line-height:1.45; z-index:20;
  border:3px solid var(--trainer-color); white-space:pre-line;
}
.speech-bubble.show{opacity:1;transform:scale(1);}

#bubble-trainer{left:4%;top:6%;border-color:#ff6f00;color:#fff3e0;}
#bubble-trainer::after{content:'';position:absolute;bottom:-14px;left:28px;border:8px solid transparent;border-top-color:#111;}
#bubble-trainer::before{content:'';position:absolute;bottom:-18px;left:25px;border:10px solid transparent;border-top-color:#ff6f00;}

#bubble-member{right:4%;top:6%;border-color:#42a5f5;color:#e3f2fd;}
#bubble-member::after{content:'';position:absolute;bottom:-14px;right:28px;border:8px solid transparent;border-top-color:#111;}
#bubble-member::before{content:'';position:absolute;bottom:-18px;right:25px;border:10px solid transparent;border-top-color:#42a5f5;}

.lazy-bubble{
  background:#0a1520!important;border-color:#42a5f5!important;
  font-style:italic;color:#b3d9ff!important;
}

/* float emoji */
.float-emoji{
  position:absolute;font-size:1.7rem;
  animation:floatUp 2s ease-out forwards;pointer-events:none;z-index:30;
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-100px) scale(2) rotate(15deg)}}

/* BOOM text */
.boom-text{
  position:absolute;
  font-family:'Bebas Neue',cursive;
  font-size:clamp(1.5rem,3vw,2.5rem);
  letter-spacing:3px;
  color:#ffd600;
  text-shadow:0 0 20px #ff6f00,3px 3px 0 #8B3A00;
  pointer-events:none; z-index:25; opacity:0;
  animation:boomPop 0.8s ease forwards;
}
@keyframes boomPop{
  0%{opacity:0;transform:scale(0.2) rotate(-10deg);}
  45%{opacity:1;transform:scale(1.5) rotate(5deg);}
  80%{opacity:1;transform:scale(1.1);}
  100%{opacity:0;transform:scale(0.9) translateY(-30px);}
}

/* CHARACTER ANIMS */
@keyframes trainerPump{0%,100%{transform:translateY(0) scaleY(1)}25%{transform:translateY(-14px) scaleY(1.04)}75%{transform:translateY(-8px) scaleY(1.02)}}
@keyframes memberSag  {0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(6px) rotate(1.5deg)}}
@keyframes trainerJump{0%,100%{transform:translateY(0)}30%{transform:translateY(-18px)}60%{transform:translateY(-8px)}}
@keyframes memberSnore{0%,100%{transform:rotate(0deg)}50%{transform:rotate(2deg) translateY(4px)}}
@keyframes idleBob    {0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

#trainer-char{transform-origin:215px 410px;}
#member-char {transform-origin:730px 410px;}

.trainer-idle    #trainer-char{animation:idleBob    2.5s ease-in-out infinite;}
.member-idle     #member-char {animation:idleBob    2.5s ease-in-out infinite 0.5s;}
.trainer-talking #trainer-char{animation:trainerPump 0.45s ease-in-out infinite;}
.trainer-jump    #trainer-char{animation:trainerJump 0.5s ease-in-out infinite;}
.member-talking  #member-char {animation:memberSag   0.6s ease-in-out infinite;}
.member-snore    #member-char {animation:memberSnore 0.8s ease-in-out infinite;}

/* PROGRESS */
.progress-track{width:min(960px,98vw);height:8px;background:#1a1a1a;border-radius:10px;margin:10px 0 6px;overflow:hidden;border:2px solid #333;}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#ff6f00,#ffd600,#ff6f00);
  background-size:200%;animation:pgFlow 2s linear infinite;
  border-radius:10px;transition:width 0.4s ease;width:0%;
}
@keyframes pgFlow{0%{background-position:0%}100%{background-position:200%}}

.status{color:#ffcc80;font-size:0.82rem;font-weight:700;margin:4px 0 10px;min-height:20px;text-align:center;}

.controls{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap;justify-content:center;}
.btn{
  font-family:'Bebas Neue',cursive;font-weight:400;font-size:1.2rem;
  padding:11px 34px;border:none;border-radius:50px;cursor:pointer;
  transition:transform 0.15s,box-shadow 0.15s;letter-spacing:2px;min-width:140px;
}
.btn:hover {transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4);}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:0.4;cursor:default;transform:none;}
.btn-play{background:linear-gradient(135deg,#ff6f00,#e65100);color:white;box-shadow:0 4px 0 #8B3A00;border:2px solid #ff8c00;}
.btn-stop{background:linear-gradient(135deg,#37474f,#263238);color:#cfd8dc;box-shadow:0 4px 0 #111;}
</style>

<script>
// ── SCRIPT ────────────────────────────────────────────────────────────
const script = [
  { speaker:'trainer', text:'GOOD MORNING CHAMPION! Day 1! Let\'s GOOO! 💪🔥', emotion:'💪', state:'jump', boom:'LET\'S GO!' },
  { speaker:'member',  text:'My knee hurts.', emotion:'😴', state:'snore' },
  { speaker:'trainer', text:'You just walked IN. You haven\'t done ANYTHING yet!', emotion:'😤', state:'talk', boom:'WHAT?!' },
  { speaker:'member',  text:'Pre-emptive knee pain. It knows what\'s coming.', emotion:'🦵', state:'snore' },
  { speaker:'trainer', text:'Okay fine! Let\'s start with 10 pushups! EASY!', emotion:'💪', state:'jump' },
  { speaker:'member',  text:'My back.', emotion:'😩', state:'snore' },
  { speaker:'trainer', text:'10 SQUATS THEN!', emotion:'😤', state:'talk', boom:'SQUATS!' },
  { speaker:'member',  text:'My ankle.', emotion:'😮', state:'snore' },
  { speaker:'trainer', text:'SIT UPS! JUST SIT UPS!', emotion:'🔥', state:'jump', boom:'SIT UPS!!' },
  { speaker:'member',  text:'My neck.', emotion:'😑', state:'snore' },
  { speaker:'trainer', text:'WHAT DOESN\'T HURT?!', emotion:'😭', state:'talk', boom:'WHAT?!' },
  { speaker:'member',  text:'My fingers. I can do finger exercises. 🤙', emotion:'🤙', state:'talk' },
  { speaker:'trainer', text:'Fine. Walk on the treadmill. SLOW speed. 3km/h.', emotion:'😤', state:'talk' },
  { speaker:'member',  text:'Can it go lower?', emotion:'😐', state:'snore' },
  { speaker:'trainer', text:'That\'s already WALKING speed!! That\'s what humans DO!', emotion:'💢', state:'jump', boom:'WALKING!!' },
  { speaker:'member',  text:'I\'m more of a... standing person.', emotion:'🧍', state:'snore' },
  { speaker:'trainer', text:'WHY DID YOU EVEN JOIN THE GYM?!!', emotion:'😱', state:'jump', boom:'WHY!!' },
  { speaker:'member',  text:'The AC is very good here.\nMy house AC is broken. 🥶', emotion:'❄️', state:'snore' },
  { speaker:'trainer', text:'...', emotion:'😶', state:'facepalm' },
  { speaker:'member',  text:'Also the wifi is fast. I\'m on episode 6 of season 3.', emotion:'📱', state:'snore' },
  { speaker:'trainer', text:'I need a new job.', emotion:'😔', state:'facepalm' },
  { speaker:'member',  text:'See! Even YOU needed to sit down!\nMaybe rest IS the workout!', emotion:'😂', state:'talk' },
  { speaker:'trainer', text:'...You know what? You\'re right. Let\'s both just sit here.', emotion:'🪑', state:'facepalm' },
  { speaker:'member',  text:'NOW you\'re a good trainer! Best session ever! ⭐⭐⭐⭐⭐', emotion:'⭐', state:'talk' },
];

// ── VOICES ──────────────────────────────────────────────────────────
const synth = window.speechSynthesis;
let voices = [];
function loadVoices(){ voices = synth.getVoices(); }
loadVoices();
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged = loadVoices;

function getVoice(speaker){
  if(!voices.length) voices = synth.getVoices();
  const en = voices.filter(v=>v.lang.startsWith('en'));
  if(speaker==='trainer'){
    return en.find(v=>/george|daniel|james|david/i.test(v.name))
        || en.find(v=>v.lang==='en-US') || en[0];
  }
  return en.find(v=>/alex|oliver|thomas/i.test(v.name))
      || en[1] || en[0];
}

function speak(text, speaker, onEnd){
  synth.cancel();
  const clean = text.replace(/[^\w\s,!?.''\-\n.…]/g,'').trim();
  const utter = new SpeechSynthesisUtterance(clean);
  if(speaker==='trainer'){ utter.pitch=0.75; utter.rate=1.05; utter.volume=1; }
  else                   { utter.pitch=1.1;  utter.rate=0.82; utter.volume=0.9; }
  const v=getVoice(speaker); if(v) utter.voice=v;
  utter.onend  = ()=>onEnd&&onEnd();
  utter.onerror = ()=>onEnd&&onEnd();
  synth.speak(utter);
}

}

    g.innerHTML=`<path id="member-mouth" d="M715,210 Q732,222 745,212" stroke="#c0725a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;

    g.innerHTML=`<path id="member-mouth" d="M715,210 Q730,218 745,210" stroke="#c0725a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;

  const r=document.getElementById('mem-brow-r');
  if(type==='sleepy'){
    l.setAttribute('d','M692,157 Q708,154 720,157');
    r.setAttribute('d','M740,157 Q752,154 768,157');
  } else {
    l.setAttribute('d','M692,154 Q708,150 720,154');
    r.setAttribute('d','M740,154 Q752,150 768,154');
  }
}
function setZzz(show){
  ['zzz1','zzz2','zzz3'].forEach((id,i)=>{
    document.getElementById(id).style.opacity = show ? (0.9-i*0.2).toString() : '0';
  });
}
function setTrainerSweat(show){
  ['trainerSweat1','trainerSweat2'].forEach(id=>{
    document.getElementById(id).style.opacity = show ? '0.8' : '0';
  });
}
function lookAt(speaker){
  const tl=document.getElementById('tPupilL'); const tr=document.getElementById('tPupilR');
  const ml=document.getElementById('mPupilL'); const mr=document.getElementById('mPupilR');
  if(speaker==='trainer'){
    tl.setAttribute('cx','199'); tr.setAttribute('cx','251');
    ml.setAttribute('cx','702'); mr.setAttribute('cx','750');
  } else {
    tl.setAttribute('cx','195'); tr.setAttribute('cx','247');
    ml.setAttribute('cx','710'); mr.setAttribute('cx','758');
  }
}

// ── STATE ────────────────────────────────────────────────────────────
let currentIdx=0, isPlaying=false, isPaused=false, timeoutId=null;
const playBtn=document.getElementById('playBtn');
const stopBtn=document.getElementById('stopBtn');

playBtn.addEventListener('click',()=>{
  if(!isPlaying && currentIdx===0){
    isPlaying=true; isPaused=false; stopBtn.disabled=false;
    playBtn.textContent='⏸ Pause';
    document.getElementById('status').textContent='🏋️ Day 1 begins...';
    setTimeout(showNext,500);
  } else if(!isPlaying && currentIdx>=script.length){
    resetScene(); isPlaying=true; isPaused=false; stopBtn.disabled=false;
    playBtn.textContent='⏸ Pause'; setTimeout(showNext,500);
  } else if(isPlaying && !isPaused){
    isPaused=true; clearTimeout(timeoutId); synth.pause();
    playBtn.textContent='▶ Resume';
    document.getElementById('status').textContent='⏸ Paused — even the trainer needed a break';
  } else if(isPaused){
    isPaused=false; synth.resume(); playBtn.textContent='⏸ Pause'; showNext();
  }
});
stopBtn.addEventListener('click',()=>{ resetScene(); stopBtn.disabled=true; });

// ── PLAY LOOP ─────────────────────────────────────────────────────────
function showNext(){
  if(!isPlaying||isPaused) return;
  if(currentIdx>=script.length){
    isPlaying=false; playBtn.textContent='↺ Replay';
    document.getElementById('progressFill').style.width='100%';
    document.getElementById('status').textContent='😂 Best. Workout. Ever. (Calories burned: 0)';
    hideBubbles(); resetExpressions();
    return;
  }
  const item=script[currentIdx];
  document.getElementById('progressFill').style.width=(currentIdx/script.length*100)+'%';

  setCharState(item.speaker, item.state);
  lookAt(item.speaker);

  if(item.speaker==='trainer'){
    setTrainerMouth(item.state==='facepalm'?'despair':item.state==='jump'?'shout':'talk');
    setTrainerSweat(item.state==='jump'||item.state==='facepalm');
    setZzz(false);
  } else {
    setMemberBrows(item.state==='snore'?'sleepy':'normal');
    setMemberMouth(item.state==='snore'?'yawn':item.emotion==='😂'||item.emotion==='⭐'?'smirk':'normal');
    setZzz(item.state==='snore');
  }

  const label=item.speaker==='trainer'?'💪 Trainer':'😴 Member';
  const short=item.text.replace(/\n/g,' ').substring(0,55);
  document.getElementById('status').textContent=`${label}: "${short}${item.text.length>55?'...':''}"`;

  showBubble(item.speaker, item.text);
  spawnEmoji(item.speaker, item.emotion);
  if(item.boom) spawnBoom(item.boom, item.speaker);

  speak(item.text, item.speaker, ()=>{
    if(isPlaying&&!isPaused){
      timeoutId=setTimeout(()=>{ currentIdx++; showNext(); }, 700);
    }
  });
}

function setCharState(speaker, state){
  const svg=document.getElementById('sceneSVG');
  svg.className='';
  const cssMap = {talk:'talking', jump:'jump', snore:'snore', facepalm:'facepalm'};
  const cssState = cssMap[state]||'talking';
  svg.classList.add(`${speaker}-${cssState}`);
  const other=speaker==='trainer'?'member':'trainer';
  svg.classList.add(`${other}-idle`);
}

function showBubble(speaker, text){
  hideBubbles();
  const el=document.getElementById(`bubble-${speaker}`);
  el.className='speech-bubble'+(speaker==='member'?' lazy-bubble':'');
  el.style.whiteSpace='pre-line'; el.textContent=text;
  setTimeout(()=>el.classList.add('show'),30);
}
function hideBubbles(){
  document.getElementById('bubble-trainer').classList.remove('show');
  document.getElementById('bubble-member').classList.remove('show');
}
function spawnEmoji(speaker, emoji){
  const w=document.querySelector('.scene-wrapper'); if(!w) return;
  const el=document.createElement('div'); el.className='float-emoji'; el.textContent=emoji;
  el.style.left=speaker==='trainer'?(50+Math.random()*120)+'px':(660+Math.random()*120)+'px';
  el.style.top='180px'; w.appendChild(el); setTimeout(()=>el.remove(),2200);
}
function spawnBoom(text, speaker){
  const w=document.querySelector('.scene-wrapper'); if(!w) return;
  const el=document.createElement('div'); el.className='boom-text'; el.textContent=text;
  el.style.top=(80+Math.random()*60)+'px';
  el.style.left=speaker==='trainer'?'5%':'55%';
  w.appendChild(el); setTimeout(()=>el.remove(),1000);
}
function resetExpressions(){
  setTrainerMouth('normal'); setMemberMouth('normal');
  setMemberBrows('normal'); setZzz(false); setTrainerSweat(false);
}
function resetScene(){
  clearTimeout(timeoutId); synth.cancel();
  isPlaying=false; isPaused=false; currentIdx=0;
  hideBubbles(); resetExpressions();
  playBtn.textContent='▶ Play';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('status').textContent='Press ▶ Play to start the workout! 💪';
  document.getElementById('sceneSVG').className='';
}
</script>
</body>
</html>
